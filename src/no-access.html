<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Access - Application</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="container">
    <div class="top-hero">
      <div>
        <span class="hero-badge">Access Restricted</span>
        <h1>No Access</h1>
        <div class="page-subtitle">
          Your account is authenticated, but it is not allowed to use this application.
        </div>
      </div>
    </div>

    <div class="card">
      <div class="info-banner">
        Please contact the administrator if you need access to this service.
      </div>
    </div>

    <div class="card soft">
      <div class="action-row">
        <button id="logoutBtn" class="secondary">Logout</button>
        <button onclick="window.location.href='/'">Go Home</button>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("logoutBtn")?.addEventListener("click", async () => {
      try {
        await fetch("/api/logout", {
          method: "POST",
          credentials: "include",
          cache: "no-store"
        });
      } catch {}

      localStorage.removeItem("appCurrentUser");
      localStorage.removeItem("selectedArea");
      sessionStorage.removeItem("login_email");

      window.location.replace("/?logged_out=1");
    });
  </script>
</body>
</html>
