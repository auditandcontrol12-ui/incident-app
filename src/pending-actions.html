<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pending Actions - Incident Reporting Portal</title>
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="container">
    <div class="top-hero">
      <div>
        <span class="hero-badge">Workbench</span>
        <h1>Pending Actions</h1>
        <div class="page-subtitle">
          Review and action items assigned to you from submitted incidents.
        </div>
      </div>
    </div>

    <div class="page-shell">
      <div class="card">
        <div class="section-title">Action Filters</div>

        <div class="action-filter-row">
          <button type="button" class="secondary status-filter-btn active" data-status="OPEN,IN_PROGRESS">Open + In Progress</button>
          <button type="button" class="secondary status-filter-btn" data-status="OPEN">Open</button>
          <button type="button" class="secondary status-filter-btn" data-status="IN_PROGRESS">In Progress</button>
          <button type="button" class="secondary status-filter-btn" data-status="COMPLETED">Completed</button>
          <button type="button" class="secondary status-filter-btn" data-status="CANCELLED">Cancelled</button>
          <button type="button" class="secondary status-filter-btn" data-status="ALL">All</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title">My Pending Actions</div>
        <div class="lines-table-wrap">
          <table class="lines-table">
            <thead>
              <tr>
                <th>Action No</th>
                <th>Incident No</th>
                <th>Business Area</th>
                <th>Title</th>
                <th>Action Type</th>
                <th>Assigned Department</th>
                <th>Assigned User</th>
                <th>Status</th>
                <th>Created On</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="pendingActionsTableBody">
              <tr>
                <td colspan="10">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="action-row" style="margin-top:16px;">
          <button id="backToDashboardBtn" class="secondary">Back to Dashboard</button>
        </div>
      </div>

      <div id="pageLoader" class="page-loader" aria-hidden="true">
        <div class="page-loader-card">
          <div class="page-loader-spinner"></div>
          <div id="pageLoaderText" class="page-loader-text">Loading pending actions...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/core/app.js"></script>
  <script src="/js/core/auth.js"></script>
  <script src="/js/pages/pending-actions.js"></script>
</body>
</html>
